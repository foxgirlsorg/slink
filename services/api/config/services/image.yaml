parameters:
  supports_resize:
    [
      'image/bmp',
      'image/png',
      'image/jpeg',
      'image/jpg',
      'image/webp',
      'image/gif',
      'image/avif',
    ]
  supports_strip_exif:
    [
      'image/jpeg',
      'image/jpg',
      'image/heic',
      'image/heif',
      'image/tiff',
      'image/tif',
    ]
  enforce_conversion: ['image/heic', 'image/heif', 'image/tiff', 'image/tif']
  requires_sanitization: ['image/svg+xml', 'image/svg']

services: ~
